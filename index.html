<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>
    <style>
        body{
            background:#111827;
            color:white;
            font-family:Arial;
            text-align:center;
            margin:0;
        }

        .box{
            background:#1f2937;
            width:80%;
            margin:30px auto;
            padding:20px;
            border-radius:15px;
        }

        h1{
            color:gold;
        }

        button{
            padding:15px 30px;
            font-size:18px;
            border:none;
            border-radius:10px;
            margin:10px;
            color:white;
            cursor:pointer;
        }

        .buy{
            background:green;
        }

        .sell{
            background:red;
        }
    </style>
</head>

<body>

<h1>Trading Dashboard</h1>

<div class="box">
    <h2>Balance</h2>
    <h3>$10,000</h3>

    <h2>Today's Profit</h2>
    <h3 style="color:lime;">+$245</h3>

    <button class="buy">BUY</button>
    <button class="sell">SELL</button>
</div>

<div class="box">
    <h2>Watchlist</h2>
    <p>EUR/USD</p>
    <p>GBP/USD</p>
    <p>XAU/USD</p>
    <p>BTC/USD</p>
</div>

</body>
</html>
